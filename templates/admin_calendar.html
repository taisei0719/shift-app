<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者画面</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{{ year }}年 {{ month }}月</h1>
    
    <div style="display:flex; justify-content: space-between; margin: 10px 0;">
        <a href="{{ url_for('admin', year=prev_year, month=prev_month) }}">← 前の月</a>
        <a href="{{ url_for('admin', year=next_year, month=next_month) }}">次の月 →</a>
    </div>
    
    <table border="1">
        <tr>
            {% for day in days %}
                {% if loop.index0 % 7 == 0 %}
                    </tr><tr>
                {% endif %}
                <td>
                    {{ day.day }}
                    <br>
                    {% if day.month == month %}
                        <a href="{{ url_for('admin_day', date=day.strftime('%Y-%m-%d')) }}">詳細</a>
                    {% else %}
                        <!-- 当月以外はリンクなし -->
                        <span style="color: gray;">詳細</span>
                    {% endif %}
                </td>
            {% endfor %}
        </tr>
    </table>

</body>
</html>
