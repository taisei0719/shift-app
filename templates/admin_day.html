<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者画面 - {{ date }}</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{{ date }} のシフト一覧</h1>

    <div id="shift-graph" style="width:100%; height:600px;"></div>

    <script>
        var data = [];
        {% for name, times in schedule.items() %}
            {% for t in times %}
                // 開始時間
                var start = t;
                var h = parseInt(t.split(':')[0]);
                var m = parseInt(t.split(':')[1]);

                // 30分後を終了時間に設定
                var end_h = h;
                var end_m = m + 30;
                if (end_m == 60) { end_m = 0; end_h += 1; }
                var end = ("0"+end_h).slice(-2) + ":" + ("0"+end_m).slice(-2);

                data.push({
                    x: [start, end],
                    y: ["{{ name }}", "{{ name }}"],
                    mode: "lines",
                    line: { width: 20 },
                    showlegend: false
                });
            {% endfor %}
        {% endfor %}

        var layout = {
            title: '{{ date }} のシフト提出',
            xaxis: { title: '時間', type: 'category' },
            yaxis: { title: 'スタッフ' },
            margin: { l: 150 },
            height: 600
        };

        Plotly.newPlot('shift-graph', data, layout);
    </script>

    <a href="{{ url_for('admin') }}">カレンダーに戻る</a>
</body>
</html>
