<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者画面 - {{ date }}</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>{{ date }} のシフト一覧</h1>

    <div id="shift_graph" style="width:100%; height:600px;"></div>

    <script>
    var data = [];

    {% for name, shifts in schedule.items() %}
      {% for s in shifts %}
        {% set start = s.split('-')[0] %}
        {% set end = s.split('-')[1] %}
        // ダミー日付をつけてISO形式にする（Plotlyはtime scaleに日付が必要）
        var startISO = "{{ date }}T{{ start }}";
        var endISO   = "{{ date }}T{{ end }}";

        data.push({
          type: 'bar',
          x: [new Date(endISO) - new Date(startISO)], // 棒の長さ（ミリ秒差）
          y: ["{{ name }}"],
          base: new Date(startISO), // 棒の開始位置
          orientation: 'h',
          name: "{{ name }}",
          width: 0.1,  //シフトの棒の太さ
          hovertext: "{{ start }} - {{ end }}",
          hoverinfo: "text"
        });
      {% endfor %}
    {% endfor %}

    var layout = {
      barmode: 'stack',
      title: "{{ date }} のシフト希望",
      xaxis: {
        title: '時間',
        type: 'date',
        tickformat: "%H:%M"  // 時間だけ表示
      },
      yaxis: {
        title: 'スタッフ',
        automargin: true
      },
      bargap: 0.4,       // 棒同士の間隔（0〜1で設定、数値を大きくすると細くなる）
      bargroupgap: 0.2,  // グループ間の間隔
      margin: {l: 100}
    };

    Plotly.newPlot('shift_graph', data, layout);
    </script>

    <a href="{{ url_for('admin') }}">カレンダーに戻る</a>
</body>
</html>
