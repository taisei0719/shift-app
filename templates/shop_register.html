{% extends "index.html" %}

{% block title %}店舗登録{% endblock %}

{% block content %}
<h1>店舗登録</h1>
<form method="post">
    <label>店舗名:<br><input type="text" name="name" required></label><br>
    <label>所在地:<br><input type="text" name="location"></label><br>
    <button type="submit">登録</button>
</form>

{% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <div class="flash">{{ message }}</div>
    {% endfor %}
  {% endif %}
{% endwith %}
{% endblock %}
