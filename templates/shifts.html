<!DOCTYPE html>
<html>
<head>
  <title>シフト表</title>
</head>
<body>
  <h1>シフト表</h1>
  <table border="1">
    <tr><th>日付</th><th>時間帯</th><th>名前</th><th>希望</th></tr>
    {% for d in data %}
    <tr>
      <td>{{ d[0] }}</td>
      <td>{{ d[1] }}</td>
      <td>{{ d[2] }}</td>
      <td>{{ "◯" if d[3] else "-" }}</td>
    </tr>
    {% endfor %}
  </table>
  <a href="{{ url_for('index') }}">戻る</a>
</body>
</html>
