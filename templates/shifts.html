<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>シフト表</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h1>シフト表</h1>

  <table>
    <tr>
      <th>日付</th>
      <th>時間帯</th>
      <th>名前</th>
      <th>希望</th>
    </tr>
    {% for d in data %}
    <tr>
      <td>{{ d[0] }}</td>
      <td>{{ d[1] }}</td>
      <td>{{ d[2] }}</td>
      <td>{{ "◯" if d[3] else "-" }}</td>
    </tr>
    {% endfor %}
  </table>

  <div style="text-align:center; margin-top:20px;">
    <a href="{{ url_for('index') }}">戻る</a>
  </div>
</body>
</html>
