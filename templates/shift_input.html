<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シフト提出</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>シフト提出ページ</h1>

    <form method="post" action="{{ url_for('shift_input') }}">
        <label>日付:</label>
        <input type="date" name="date" required><br><br>

        <label>時間帯:</label>
        <select name="time_slot">
            <option value="9-13">9-13</option>
            <option value="13-17">13-17</option>
            <option value="17-21">17-21</option>
        </select><br><br>

        <label>出勤可能:</label>
        <input type="checkbox" name="available"><br><br>

        <button type="submit">提出</button>
    </form>

    <div style="text-align:center; margin-top:20px;">
        <a href="{{ url_for('staff') }}">戻る</a>
    </div>
</body>
</html>
