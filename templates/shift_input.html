<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シフト提出</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>シフト提出ページ</h1>

    <form method="post" action="{{ url_for('shift_input') }}">
    <label>日付:</label>
    <input type="date" name="date" required><br><br>

    <label>勤務可能時間:</label><br>
    {% for hour in range(8, 22) %}
        {% for half in [0, 30] %}
            {% set t = "%02d:%02d" % (hour, half) %}
            <input type="checkbox" name="time_slots" value="{{ t }}">{{ t }}
        {% endfor %}
        <br>
    {% endfor %}

    <br><button type="submit">提出</button>
</form>

    <div style="text-align:center; margin-top:20px;">
        <a href="{{ url_for('staff') }}">戻る</a>
    </div>
</body>
</html>
