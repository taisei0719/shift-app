version: '3.9' # バージョンはこのままでOK

services:
  # データベースボリュームの管理サービス
  db:
    container_name: shift_app_db_volume_manager
    image: busybox:latest # 軽量なイメージでボリューム管理だけする
    volumes:
      # ホストOSのinstanceディレクトリを永続化するための名前付きボリューム
      - db_data:/instance # 名前付きボリュームとコンテナ内のパスを定義

  # バックエンドサービス (Flask)
  backend:
    build:
      context: ./backend # ビルドコンテキストを指定
      dockerfile: Dockerfile # Dockerfile名も指定しとくと明確
    container_name: shift_app_backend # コンテナ名を分かりやすく
    ports:
      - "5000:5000"
    # .envファイルから環境変数を読み込むのはOKやけど、後で使うかもやから残しとく
    # env_file: .env 
    volumes:
      - ./backend:/app # 開発時のホットリロード用にマウント
      - ./instance:/instance # データベースファイルをホストと共有して永続化
    environment:
      # Next.jsからアクセスできるように環境変数を設定
      - FLASK_ENV=development
      # ★DB接続URLを明示的に指定（dbサービスでマウントした/instance内のファイル）
      - DATABASE_URL=sqlite:////instance/shift.db 
    depends_on:
      - db # DBの準備ができてから起動させる

  # フロントエンドサービス (Next.js)
  frontend:
    build:
      context: ./frontend # ビルドコンテキストを指定
      dockerfile: Dockerfile # Dockerfile名も指定しとくと明確
    container_name: shift_app_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # node_modulesはコンテナ内でインストールしたものを使うように除外
    environment:
      # Next.jsからバックエンドにアクセスするための環境変数を設定
      # サービス名（backend）でコンテナ間通信させるのがポイント
      - NEXT_PUBLIC_API_BASE_URL=http://backend:5000 
    depends_on:
      - backend # バックエンドが起動してからフロントエンドを起動

# ボリューム定義の追加
volumes:
  db_data:
