{% extends "index.html" %}

{% block title %}アカウント情報の編集{% endblock %}

{% block content %}
<div class="edit-account-container">
    <h1>アカウント情報の編集</h1>
    <form method="post">
        <label>名前:<br>
            <input type="text" name="name" value="{{ user.name }}" required>
        </label><br>

        <label>メールアドレス:<br>
            <input type="email" name="email" value="{{ user.email or '' }}">
        </label><br>

        <label>新しいパスワード（変更しない場合は空欄）:<br>
            <input type="password" name="password">
        </label><br>

        <button type="submit">更新</button>
    </form>

    <div class="center-message">
        <a href="{{ url_for('staff') if user.role == 'staff' else url_for('admin') }}">戻る</a>
    </div>
</div>
{% endblock %}
