# shift-app/docker-compose.yml
version: '3.9' # バージョンはこのままでOK

services:
  # データベースボリュームの管理サービス
  db:
    container_name: shift_app_db_volume_manager
    image: busybox:latest # 軽量なイメージでボリューム管理だけする
    volumes:
      # ホストOSのinstanceディレクトリを永続化するための名前付きボリューム
      - db_data:/instance # 名前付きボリュームとコンテナ内のパスを定義

  # バックエンドサービス (Flask)
  backend:
    build:
      context: ./backend # ビルドコンテキストを指定
      dockerfile: Dockerfile # Dockerfile名も指定しとくと明確
    container_name: shift_app_backend # コンテナ名を分かりやすく
    ports:
      - "5000:5000"
    # .envファイルから環境変数を読み込むのはOKやけど、後で使うかもやから残しとく
    # env_file: .env 
    volumes:
      - ./backend:/app # 開発時のホットリロード用にマウント
      - ./instance:/instance # データベースファイルをホストと共有して永続化
    environment:
      - FLASK_ENV=development # Next.jsからアクセスできるように環境変数を設定
      - DATABASE_URL=sqlite:////instance/shifts.db # ★DB接続URLを明示的に指定（dbサービスでマウントした/instance内のファイル）
      - PORT=5000 #開発用
    depends_on:
      - db # DBの準備ができてから起動させる

  # フロントエンドサービス (Next.js)
  frontend:
    # Dockerfileを使わずに直接nodeイメージを使う
    image: node:22-slim
    container_name: shift_app_frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules # ホストのnode_modulesが混ざらないように保護
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5000
      - HOST=0.0.0.0
      - NODE_ENV=development
    # 起動時にインストールしてdevモードで動かす
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

# ボリューム定義の追加
volumes:
  db_data:
